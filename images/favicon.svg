<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0A0A0A"/>
  <!-- Track Ring -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="#F0F0F0" stroke-width="2"/>
  <!-- DT Letters -->
  <g transform="translate(32,32) skewX(-12)">
    <text x="-5" y="5" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="900" letter-spacing="0.5" fill="#F0F0F0" text-anchor="middle">D</text>
    <text x="6" y="5" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="14" font-weight="900" letter-spacing="0.5" fill="#E63946" text-anchor="middle">T</text>
  </g>
  <!-- Start Light Red Dot -->
  <circle cx="43" cy="43" r="1.5" fill="#E63946"/>
</svg>
